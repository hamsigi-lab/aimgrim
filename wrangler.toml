# Cloudflare Pages 설정 — main 브랜치 push 시 자동 배포.
# Vite 빌드 결과(dist/)를 정적 자산으로 서빙한다.
# (이후 D1/Functions를 붙일 때 [[d1_databases]] 바인딩을 여기 추가한다.)
name = "aimgrim"
compatibility_date = "2026-04-28"
pages_build_output_dir = "dist"

# 공개 환경변수 — Google OAuth 클라이언트 ID (백엔드 ID 토큰 검증용, 공개값)
[vars]
GOOGLE_CLIENT_ID = "1045289294896-816nnml0mfhrsciuhem5p045otkgi1ks.apps.googleusercontent.com"

# D1 데이터베이스 바인딩 — Pages Functions에서 env.DB 로 접근
[[d1_databases]]
binding = "DB"
database_name = "aimgrim-db"
database_id = "aa2d1822-07a2-4bb2-8ee0-69258e44c76f"
